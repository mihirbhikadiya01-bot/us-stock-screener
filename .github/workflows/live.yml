name: Live Trigger Alerts (hourly)

on:
  schedule:
    # Hourly between the two big runs. Summer: 14:23-18:23 UTC = 10:23am-2:23pm ET.
    - cron: "23 14,15,16,17,18 * * 1-5"   # odd minute = less delay
  workflow_dispatch:
    inputs:
      heartbeat:
        description: "Send a status message even if no triggers"
        default: "true"

permissions:
  contents: write
concurrency:
  group: screener-state
  cancel-in-progress: false

jobs:
  live-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check watchlist triggers (alerts only if something fired)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_MODE: "live"
          RUN_SCHEDULER: "False"
          LIVE_NEAR_PCT: "1.5"
          LIVE_ALERT_APPROACH: "True"
          LIVE_HEARTBEAT_RUN: ${{ inputs.heartbeat || 'false' }}
        run: python main.py
      - name: Save alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add alert_state.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "No changes."; else
            git commit -m "Alert state $(date -u +%Y-%m-%d %H:%M)"; git push; fi
