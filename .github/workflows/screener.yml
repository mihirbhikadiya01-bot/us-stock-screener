name: Weekly US Stock Screener

on:
  schedule:
    - cron: "0 11 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: "False"
          UNIVERSE: "ALL_NA"
          MAX_STOCKS: "0"
          REQUEST_DELAY_SECONDS: "0.6"
          RUN_SCHEDULER: "False"
        run: python main.py
      - name: Save results back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.csv latest_results.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No tracking changes to commit."
          else
            git commit -m "Update US screener results $(date -u +%Y-%m-%d)"
            git push
          fi
